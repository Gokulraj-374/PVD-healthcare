name: Build and Deploy to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-and-deploy:
    concurrency: ci-${{ github.ref }} # Prevents parallel deployment clashes
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository 📂
        uses: actions/checkout@v4

      - name: Setup Node.js ⚙️
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies 📦
        run: npm ci

      - name: Compile Production Build 🚀
        run: npm run build

      - name: Deploy to GitHub Pages 🌍
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist # The built directory Vite outputs
          branch: gh-pages # The target branch hosting your site
          clean: true # Automatically remove obsolete files
